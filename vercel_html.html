<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Wrennon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --ink: #F3F4F6;
            --ink-soft: #9CA3AF;
            --paper: rgba(17, 24, 39, 0.7);
            --paper-dim: #0B0E14;
            --line: rgba(255, 255, 255, 0.08);
            --accent: #3B82F6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--paper-dim);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            color: var(--ink);
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            padding: 40px;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--line);
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .admin-header h2 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff, #9CA3AF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            color: var(--ink);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
            border: none;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn-primary:hover {
            background: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #F87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: none;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-1px);
        }

        h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--ink);
            font-weight: 700;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 16px;
            align-items: end;
            background: rgba(0,0,0,0.2);
            padding: 24px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .form-group label {
            font-size: 12px;
            color: var(--ink-soft);
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-wrapper input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            color: var(--ink);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .input-wrapper input:focus, .form-group select:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        
        .form-group select option {
            background: var(--paper-dim);
            color: var(--ink);
        }

        .pwd-toggle {
            position: absolute;
            right: 12px;
            background: transparent;
            border: none;
            color: var(--ink-soft);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .pwd-toggle:hover {
            color: var(--ink);
        }
        
        .hidden { display: none !important; }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 16px;
        }

        th, td {
            text-align: left;
            padding: 16px;
            border-bottom: 1px solid var(--line);
        }

        th {
            font-size: 12px;
            color: var(--ink-soft);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .role-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .role-manager {
            background: rgba(139, 92, 246, 0.15);
            color: #C4B5FD;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .role-agent {
            background: rgba(59, 130, 246, 0.15);
            color: #93C5FD;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        #error-msg {
            color: #EF4444;
            font-size: 13px;
            margin-top: 12px;
            font-weight: 500;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h2>Admin Dashboard</h2>
            <button class="btn" onclick="window.location.href='index.html'">Back to Agent Chat</button>
        </div>

        <h3>Create New Agent</h3>
        <!-- hidden inputs to trick browser password managers -->
        <input style="display:none" type="text" name="fakeusernameremembered"/>
        <input style="display:none" type="password" name="fakepasswordremembered"/>
        <form id="create-agent-form">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="agent-fullname" required autocomplete="new-password" placeholder="e.g. John Doe">
                </div>
            </div>
            <div class="form-group">
                <label>Agent Username</label>
                <div class="input-wrapper">
                    <input type="text" id="agent-username" required readonly onfocus="this.removeAttribute('readonly');" autocomplete="new-password" placeholder="e.g. john_doe">
                </div>
            </div>
            <div class="form-group">
                <label>Employee ID</label>
                <div class="input-wrapper">
                    <input type="text" id="agent-employee-id" required readonly onfocus="this.removeAttribute('readonly');" autocomplete="new-password" placeholder="e.g. EMP-1234">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="agent-password" required readonly onfocus="this.removeAttribute('readonly');" autocomplete="new-password">
                    <button type="button" class="btn-icon" id="toggle-pwd-btn" onclick="togglePasswordVisibility()" aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="agent-role">
                    <option value="agent">Agent</option>
                    <option value="manager">Manager</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="height: 43px; margin-bottom: 2px;">Create Agent</button>
            <div id="error-msg"></div>
        </form>

        <h3>Team Directory</h3>
        <p style="color: var(--ink-soft); font-size: 14px; margin-bottom: 20px;">Click on any agent to view their details.</p>
        <table>
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Employee ID</th>
                    <th>Access Level</th>
                    <th>Chats Resolved</th>
                    <th>Joined</th>
                    <th style="text-align: right;">Action</th>
                </tr>
            </thead>
            <tbody id="agents-list">
                <!-- Populated by JS -->
            </tbody>
        </table>

        <h3 style="margin-top: 48px;">System Audit Logs</h3>
        <table style="margin-bottom: 40px; opacity: 0.9;">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Actor</th>
                    <th>Action</th>
                    <th>Target</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody id="logs-list">
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>

    <!-- Agent Details Modal -->
    <div id="agent-modal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100;">
        <div style="background: var(--surface); padding: 32px; border-radius: 16px; border: 1px solid var(--border); width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
            <h3 style="margin-bottom: 24px;">Agent Details</h3>
            <div style="margin-bottom: 16px;">
                <label style="color: var(--ink-soft); font-size: 12px; font-weight: 600; text-transform: uppercase;">Full Name</label>
                <div id="modal-fullname" style="font-size: 16px; font-weight: 500; margin-top: 4px;"></div>
            </div>
            <div style="margin-bottom: 16px;">
                <label style="color: var(--ink-soft); font-size: 12px; font-weight: 600; text-transform: uppercase;">Username</label>
                <div id="modal-username" style="font-size: 16px; font-weight: 500; margin-top: 4px;"></div>
            </div>
            <div style="margin-bottom: 16px;">
                <label style="color: var(--ink-soft); font-size: 12px; font-weight: 600; text-transform: uppercase;">Employee ID</label>
                <div id="modal-employee-id" style="font-size: 16px; font-weight: 500; margin-top: 4px; font-family: monospace;"></div>
            </div>
            <div style="margin-bottom: 24px;">
                <label style="color: var(--ink-soft); font-size: 12px; font-weight: 600; text-transform: uppercase;">Role</label>
                <div id="modal-role" style="font-size: 16px; font-weight: 500; margin-top: 4px;"></div>
            </div>
            
            <div id="password-reset-section" style="margin-bottom: 24px; padding-top: 24px; border-top: 1px solid var(--border);">
                <label style="color: var(--ink-soft); font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; display: block;">Reset Password</label>
                <div style="display: flex; gap: 8px;">
                    <input type="password" id="reset-new-password" placeholder="New Password" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--ink);">
                    <button class="btn btn-primary" onclick="resetAgentPassword()" style="padding: 0 16px; min-width: auto; height: 40px;">Reset</button>
                </div>
            </div>

            <div style="margin-bottom: 24px; padding: 12px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2);">
                <span style="color: #F87171; font-size: 12px; display: block;">🔒 Passwords are hashed in the database and cannot be viewed.</span>
            </div>
            <div style="text-align: right;">
                <button class="btn btn-secondary" onclick="document.getElementById('agent-modal').style.display='none'">Close</button>
            </div>
        </div>
    </div>
    
    <script>
        const _RENDER_HOST = "wrennon-backend.onrender.com";
        const _IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.protocol === "file:";
        const API_BASE = `${_IS_LOCAL ? "http" : "https"}://${_IS_LOCAL ? "localhost:8000" : _RENDER_HOST}/api`;
        const token = localStorage.getItem("agent_token");

        if (!token) {
            window.location.href = "index.html";
        }
        
        // Toggle password logic
        const togglePwdBtn = document.getElementById("toggle-pwd");
        const pwdInput = document.getElementById("agent-password");
        const eyePaths = togglePwdBtn.querySelectorAll(".eye");
        const slashLine = togglePwdBtn.querySelector(".eye-slash");
        
        togglePwdBtn.addEventListener("click", () => {
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                eyePaths.forEach(p => p.classList.add("hidden"));
                slashLine.classList.remove("hidden");
            } else {
                pwdInput.type = "password";
                eyePaths.forEach(p => p.classList.remove("hidden"));
                slashLine.classList.add("hidden");
            }
        });

        const currentUser = localStorage.getItem("agent_username");

        let currentAgentsData = [];
        let selectedAgentUsername = null;
        
        function showAgentDetails(index) {
            const agent = currentAgentsData[index];
            if(!agent) return;
            selectedAgentUsername = agent.username;
            document.getElementById("modal-fullname").innerText = agent.full_name;
            document.getElementById("modal-username").innerText = agent.username;
            document.getElementById("modal-employee-id").innerText = agent.employee_id;
            document.getElementById("modal-role").innerText = agent.role;
            
            if (agent.role === 'ai') {
                document.getElementById('password-reset-section').style.display = 'none';
            } else {
                document.getElementById('password-reset-section').style.display = 'block';
            }
            document.getElementById("reset-new-password").value = "";
            
            document.getElementById('agent-modal').style.display = 'flex';
        }

        async function resetAgentPassword() {
            if (!selectedAgentUsername) return;
            const newPassword = document.getElementById("reset-new-password").value;
            if (!newPassword) {
                alert("Please enter a new password");
                return;
            }
            if (!confirm(`Are you sure you want to reset password for ${selectedAgentUsername}?`)) return;
            
            const res = await fetch(`${API_BASE}/admin/agents/${selectedAgentUsername}/reset-password`, {
                method: 'PUT',
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({ new_password: newPassword })
            });
            if (res.ok) {
                alert("Password reset successfully!");
                document.getElementById("reset-new-password").value = "";
                fetchLogs(); // refresh logs
            } else {
                const data = await res.json();
                alert(`Error: ${data.detail}`);
            }
        }

        async function fetchAgents() {
            try {
                const res = await fetch(`${API_BASE}/admin/agents`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                
                if (res.status === 401 || res.status === 403) {
                    alert("Session expired or access denied.");
                    window.location.href = "index.html";
                    return;
                }
                if (!res.ok) return;

                const agents = await res.json();
                currentAgentsData = agents;
                const tbody = document.getElementById("agents-list");
                tbody.innerHTML = "";

                agents.forEach((agent, index) => {
                    const roleClass = agent.role === 'manager' ? 'role-manager' : (agent.role === 'ai' ? 'role-badge' : 'role-agent');
                    let roleStyle = agent.role === 'ai' ? 'background: rgba(59, 130, 246, 0.15); color: #60A5FA; border: 1px solid rgba(59, 130, 246, 0.3);' : '';
                    const date = agent.created_at ? new Date(agent.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : '-';
                    
                    const isSelf = agent.username === currentUser;
                    const isAi = agent.role === 'ai';
                    
                    let actionCol = "";
                    if (isSelf) {
                        actionCol = `<span style="color: var(--ink-soft); font-size: 12px; font-weight: 600; margin-right: 12px;">(You)</span>`;
                    } else if (!isAi) {
                        actionCol = `<button class="btn btn-danger" onclick="event.stopPropagation(); deleteAgent('${agent.username}')">Remove</button>`;
                    }

                    const tr = document.createElement("tr");
                    tr.style.cursor = "pointer";
                    tr.onclick = () => showAgentDetails(index);
                    tr.innerHTML = `
                        <td style="font-weight: 600;">${agent.full_name}</td>
                        <td style="color: var(--ink-soft); font-family: monospace;">${agent.employee_id}</td>
                        <td><span class="role-badge ${roleClass}" style="${roleStyle}">${agent.role}</span></td>
                        <td style="font-weight: 700; font-size: 15px; color: var(--accent);">${agent.resolved_count}</td>
                        <td style="color: var(--ink-soft);">${date}</td>
                        <td style="text-align: right;">
                            ${actionCol}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error("Failed to fetch agents:", err);
                const tbody = document.getElementById("agents-list");
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--danger);">Server is currently offline or unreachable.</td></tr>`;
            }
        }
        


        async function deleteAgent(username) {
            if (!confirm(`Are you sure you want to remove agent '${username}'?`)) return;
            const res = await fetch(`${API_BASE}/admin/agents/${username}`, {
                method: 'DELETE',
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (res.ok) {
                fetchAgents();
            } else {
                const data = await res.json();
                document.getElementById("error-msg").innerText = data.detail;
            }
        }

        document.getElementById("create-agent-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerText = "Creating...";
            
            const username = document.getElementById("agent-username").value;
            const full_name = document.getElementById("agent-fullname").value;
            const employee_id = document.getElementById("agent-employee-id").value;
            const password = pwdInput.value;
            const role = document.getElementById("agent-role").value;

            const res = await fetch(`${API_BASE}/admin/agents`, {
                method: 'POST',
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ username, full_name, employee_id, password, role })
            });

            btn.disabled = false;
            btn.innerText = "Create Agent";

            if (res.ok) {
                document.getElementById("agent-username").value = "";
                document.getElementById("agent-fullname").value = "";
                document.getElementById("agent-employee-id").value = "";
                pwdInput.value = "";
                document.getElementById("error-msg").innerText = "";
                
                // reset pwd toggle if visible
                if (pwdInput.type === "text") {
                    togglePwdBtn.click();
                }
                
                fetchAgents();
                fetchLogs();
            } else {
                const data = await res.json();
                document.getElementById("error-msg").innerText = data.detail;
            }
        });
        
        async function fetchLogs() {
            try {
                const res = await fetch(`${API_BASE}/admin/logs`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!res.ok) return;
                
                const logs = await res.json();
                const tbody = document.getElementById("logs-list");
                tbody.innerHTML = "";
                
                logs.forEach(log => {
                    const date = new Date(log.created_at).toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td style="color: var(--ink-soft); font-size: 13px;">${date}</td>
                        <td style="font-weight: 600;">${log.actor}</td>
                        <td style="color: var(--accent); font-family: monospace;">${log.action}</td>
                        <td>${log.target || "-"}</td>
                        <td style="color: var(--ink-soft); font-size: 13px;">${log.details || "-"}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error("Failed to fetch logs:", err);
            }
        }

        // Force clear autofill fields completely on load
        setTimeout(() => {
            const inputs = ['agent-username', 'agent-fullname', 'agent-employee-id', 'agent-password'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.value = "";
                    el.setAttribute('readonly', 'readonly');
                }
            });
        }, 100);

        fetchAgents();
        fetchLogs();
    </script>
</body>
</html>
