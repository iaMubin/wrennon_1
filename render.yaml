services:
  - type: web
    name: wrennon-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: AGENT_PASSWORD_HASH
        sync: false
      - key: AGENT_USERNAME
        value: mubin
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_ENV
        value: production
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_HOST
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
