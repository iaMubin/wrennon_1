name: Backend Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pip-audit bandit

    # - name: Security Scanning
    #   run: |
    #     pip-audit
    #     bandit -r app/

    - name: Security Scanning
      run: |
        # Entire langchain/langgraph/langsmith stack is pinned to 0.x/0.2.x/0.3.x.
        # All fixes require a coordinated bump to langchain-core 1.x + langgraph 1.x
        # (breaking API changes in app/graph/) — tracked as a separate migration task.
        pip-audit \
          --ignore-vuln PYSEC-2026-373 \
          --ignore-vuln PYSEC-2026-1518 \
          --ignore-vuln PYSEC-2026-2193 \
          --ignore-vuln PYSEC-2026-2562 \
          --ignore-vuln PYSEC-2026-2564 \
          --ignore-vuln PYSEC-2026-2563 \
          --ignore-vuln PYSEC-2026-77 \
          --ignore-vuln PYSEC-2026-1520 \
          --ignore-vuln PYSEC-2026-83 \
          --ignore-vuln PYSEC-2026-2194 \
          --ignore-vuln PYSEC-2026-1527 \
          --ignore-vuln PYSEC-2026-2573 \
          --ignore-vuln PYSEC-2026-2574 \
          --ignore-vuln PYSEC-2026-2575 \
          --ignore-vuln PYSEC-2026-2582 \
          --ignore-vuln PYSEC-2026-2583 \
          --ignore-vuln GHSA-f4xh-w4cj-qxq8
        bandit -r app/

    - name: Run Pytest
      env:
        # Dummy values so Settings doesn't crash during initialization
        GROQ_API_KEY: "dummy"
        COHERE_API_KEY: "dummy"
        PINECONE_API_KEY: "dummy"
        PINECONE_HOST: "dummy"
        DATABASE_URL: "sqlite:///./test.db"
        JWT_SECRET_KEY: "test-secret"
        AGENT_PASSWORD_HASH: "test-hash"
        AGENT_USERNAME: "test_admin"
        PYTHONPATH: "."
      run: |
        alembic upgrade head
        pytest tests/
