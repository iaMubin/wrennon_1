<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrennon - Agent Copilot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="text-slate-800 h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold tracking-tight">Wrennon<span class="text-blue-400">AI</span></div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="block px-4 py-2 rounded bg-blue-600 text-white font-medium">Dashboard</a>
            <a href="#" class="block px-4 py-2 rounded hover:bg-slate-800 text-slate-300">Tickets</a>
            <a href="#" class="block px-4 py-2 rounded hover:bg-slate-800 text-slate-300">Customers</a>
            <a href="#" class="block px-4 py-2 rounded hover:bg-slate-800 text-slate-300">Settings</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-xl font-semibold">Overview & Analytics</h1>
            <div class="flex items-center space-x-4">
                <button onclick="fetchAnalytics()" class="text-sm bg-slate-100 hover:bg-slate-200 px-3 py-1 rounded border border-slate-300 transition">Refresh Data</button>
                <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <div class="p-8 space-y-8 max-w-7xl mx-auto w-full">
            
            <!-- Analytics Widgets -->
            <section class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass-panel p-6 rounded-xl flex flex-col justify-between">
                    <h3 class="text-slate-500 font-medium text-sm">Total Tickets</h3>
                    <p class="text-3xl font-bold mt-2" id="stat-total">0</p>
                </div>
                <div class="glass-panel p-6 rounded-xl flex flex-col justify-between border-l-4 border-l-blue-500">
                    <h3 class="text-slate-500 font-medium text-sm">AI Deflection Rate</h3>
                    <p class="text-3xl font-bold mt-2" id="stat-deflection">0%</p>
                </div>
                <div class="glass-panel p-6 rounded-xl flex flex-col justify-between">
                    <h3 class="text-slate-500 font-medium text-sm">Human Handoffs</h3>
                    <p class="text-3xl font-bold mt-2" id="stat-handoff">0</p>
                </div>
                <div class="glass-panel p-6 rounded-xl flex flex-col justify-between border-l-4 border-l-green-500 bg-gradient-to-br from-white to-green-50">
                    <h3 class="text-green-700 font-medium text-sm">Revenue Generated</h3>
                    <p class="text-3xl font-bold mt-2 text-green-600" id="stat-revenue">$0.00</p>
                    <p class="text-xs text-green-600 mt-1" id="stat-upsells">0 upsells</p>
                </div>
            </section>

            <!-- Workspace Area -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Ticket Queue -->
                <section class="lg:col-span-2 glass-panel rounded-xl overflow-hidden flex flex-col h-[500px]">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                        <h2 class="font-semibold text-lg">Active Handoffs Queue</h2>
                    </div>
                    <div class="flex-1 p-6 flex flex-col items-center justify-center text-slate-400" id="ticket-list">
                        <svg class="w-12 h-12 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        <p>No active tickets right now.</p>
                        <button onclick="demoCopilot()" class="mt-4 px-4 py-2 bg-blue-50 text-blue-600 rounded-md text-sm font-medium hover:bg-blue-100 transition">Simulate Handoff Demo</button>
                    </div>
                </section>

                <!-- Agent Copilot Sidebar -->
                <section class="glass-panel rounded-xl overflow-hidden flex flex-col h-[500px]">
                    <div class="bg-indigo-50 px-6 py-4 border-b border-indigo-100 flex justify-between items-center">
                        <h2 class="font-semibold text-lg text-indigo-900 flex items-center gap-2">
                            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            Agent Copilot
                        </h2>
                    </div>
                    <div class="flex-1 p-6 overflow-y-auto" id="copilot-panel">
                        <div class="text-sm text-slate-500 italic text-center mt-10">Select a ticket to see AI suggestions.</div>
                    </div>
                </section>

            </div>
        </div>
    </main>

    <script>
        const API_BASE = "http://localhost:8000/api";

        async function fetchAnalytics() {
            try {
                const res = await fetch(`${API_BASE}/analytics/stats`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('stat-total').innerText = data.total_tickets;
                    document.getElementById('stat-deflection').innerText = `${data.deflection_rate}%`;
                    document.getElementById('stat-handoff').innerText = data.handed_off_to_human;
                    document.getElementById('stat-revenue').innerText = `$${data.revenue_generated.toFixed(2)}`;
                    document.getElementById('stat-upsells').innerText = `${data.upsell_count} upsells`;
                }
            } catch (err) {
                console.error("Failed to fetch analytics", err);
            }
        }

        async function demoCopilot() {
            const ticketId = "TICKET-" + Math.floor(Math.random() * 10000);
            
            // Populate Ticket Queue
            const list = document.getElementById('ticket-list');
            list.innerHTML = `
                <div class="w-full bg-white border border-slate-200 rounded-lg p-4 cursor-pointer hover:border-blue-400 transition" onclick="loadCopilot('${ticketId}', 'Customer wants to cancel a shipped order')">
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-slate-800">${ticketId}</h4>
                        <span class="px-2 py-1 bg-amber-100 text-amber-800 text-xs font-bold rounded">Pending Human</span>
                    </div>
                    <p class="text-sm text-slate-600 mt-2 truncate">Subject: Customer wants to cancel a shipped order...</p>
                </div>
            `;

            loadCopilot(ticketId, 'Customer wants to cancel a shipped order');
        }

        async function loadCopilot(ticketId, summary) {
            const panel = document.getElementById('copilot-panel');
            panel.innerHTML = `<div class="flex justify-center items-center h-full"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div></div>`;

            try {
                const res = await fetch(`${API_BASE}/copilot/suggest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticket_id: ticketId, conversation_summary: summary })
                });

                if (res.ok) {
                    const data = await res.json();
                    panel.innerHTML = `
                        <div class="space-y-6">
                            <div>
                                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Next Best Action</h3>
                                <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-lg text-sm text-indigo-900 font-medium">
                                    ${data.next_best_action}
                                </div>
                            </div>
                            
                            <div>
                                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Suggested Reply Draft</h3>
                                <div class="bg-white border border-slate-200 p-4 rounded-lg text-sm text-slate-700 whitespace-pre-wrap relative group">
                                    ${data.suggested_reply}
                                    <button class="absolute top-2 right-2 p-1.5 bg-slate-100 hover:bg-indigo-100 hover:text-indigo-600 text-slate-400 rounded opacity-0 group-hover:opacity-100 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                panel.innerHTML = `<div class="text-red-500 text-sm">Failed to load Copilot suggestions.</div>`;
            }
        }

        // Initial fetch
        fetchAnalytics();
    </script>
</body>
</html>
