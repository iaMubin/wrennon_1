<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrennon Agent Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/agent/agent.css">
<script>
  if (localStorage.getItem("agent_username")) {
    document.write('<style id="anti-flash-style">#login-screen { display: none !important; }</style>');
  }
</script>
</head>
<body>


  <!-- Login screen -->
  <div id="login-screen">
    <form id="login-form">
      <h1>Agent Console</h1>
      <div class="input-group">
        <label for="username">Username or Employee ID</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username" required autocomplete="username">
        </div>
      </div>
      <div class="input-group">
        <label for="password">Passcode</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" required autocomplete="current-password">
          <button type="button" class="pwd-toggle" id="toggle-pwd" aria-label="Toggle password visibility">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <path class="eye" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle class="eye" cx="12" cy="12" r="3"></circle>
              <line class="eye-slash hidden" x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit">Log in</button>
      <p id="login-error" class="error hidden">Incorrect username or password.</p>
    </form>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <aside id="sidebar">
      <div id="sidebar-header">
        <div>
          <span id="brand">Wrennon</span>
          <span id="connection-dot" class="dot dot--offline" title="Connection status"></span>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <button id="theme-btn" class="theme-toggle-btn" aria-label="Toggle Theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
          <button id="admin-dashboard-btn" class="hidden" style="font-size: 12px; padding: 4px 8px; border: 1px solid #cbd5e1; border-radius: 4px; background: white; cursor: pointer; color: #334155;">Admin</button>
          <button id="logout-btn" class="theme-toggle-btn" aria-label="Logout" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </div>

      <nav id="section-tabs">
        <button class="tab tab--active" data-section="my_cases">
          My Cases <span id="my-cases-count" class="count">0</span>
        </button>
        <button class="tab" data-section="attention">
          Needs Attention <span id="attention-count" class="count">0</span>
        </button>
        <button class="tab" data-section="active">
          Active Chats <span id="active-count" class="count">0</span>
        </button>
        <button class="tab" data-section="all">All history</button>
      </nav>

      <div id="conversation-list"></div>
    </aside>

    <div id="resizer"></div>

    <main id="conversation-view">
      <div id="empty-state">
        <p>Select a conversation to view it here.</p>
      </div>

      <div id="active-conversation" class="hidden">
        <header id="conversation-header">
          <div class="conv-header-info">
            <h2 id="conversation-email">Unknown Customer</h2>
            <span id="conversation-session" class="short-id">CUST-XXXX</span>
          </div>
          <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 4px;">
            <button id="resolve-btn">Mark resolved</button>
            <span id="resolve-time" style="font-size: 11px; color: #64748b;" class="hidden"></span>
          </div>
        </header>

        <div id="agent-messages"></div>

        <div id="agent-input-row">
          <input type="file" id="agent-file-upload" style="display: none;" accept="image/*,audio/*,video/*,.pdf,.doc,.docx" />
          <input type="file" id="agent-photo-upload" style="display: none;" accept="image/*" />
          <input type="file" id="agent-voice-upload" style="display: none;" accept="audio/*" capture="user" />
          
          <button id="agent-upload-btn" aria-label="Upload file" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
          </button>
          <button id="agent-photo-btn" aria-label="Upload photo" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          </button>
          <button id="agent-voice-btn" aria-label="Record voice" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </button>
          
          <input id="agent-message-input" type="text" placeholder="Type a reply" autocomplete="off">
          <button id="agent-send-btn">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/agent/agent.js?v=5"></script>
</body>
</html>
