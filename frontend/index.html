<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storefront — Wrennon Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400..800;1,6..72,400..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="widget.css">
<script>
  (function() {
    var storedTheme = localStorage.getItem('wrennon_theme') || 'system';
    var isDark = storedTheme === 'dark' || (storedTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  })();
</script>
</head>
<body>

  <!-- Placeholder storefront background so the widget has real context to sit on -->
  <main class="storefront-mock">
    <header class="storefront-mock__nav">
      <span class="storefront-mock__logo">Northbound Goods</span>
    </header>
    <section class="storefront-mock__hero">
      <h1>Field jackets, built for weather that doesn't cooperate.</h1>
      <p>This page is a placeholder backdrop — the actual deliverable is the chat widget in the corner.</p>
    </section>
  </main>

  <!-- Chat widget -->
  <div id="wrennon-widget">
    <button id="launcher" aria-label="Open support chat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </button>

    <div id="panel" class="hidden">
      <header id="panel-header">
        <div class="panel-header__title">
          <span class="panel-header__brand">Northbound Goods support</span>
        </div>
        <div style="display: flex; align-items: center; gap: 4px;">
          <div class="theme-dropdown-container" style="position: relative;">
            <button id="theme-menu-btn" class="theme-toggle-btn" aria-label="Theme options" aria-haspopup="true" aria-expanded="false">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
            </button>
            <div id="theme-dropdown" class="theme-dropdown-menu hidden" role="menu" style="right: 0; top: 100%; margin-top: 8px;">
              <button class="theme-option" data-theme-value="light" role="menuitem">Light</button>
              <button class="theme-option" data-theme-value="dark" role="menuitem">Dark</button>
              <button class="theme-option" data-theme-value="system" role="menuitem">System</button>
            </div>
          </div>
          <button id="close-btn" class="theme-toggle-btn" aria-label="Close chat">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </header>

      <div id="messages" aria-live="polite"></div>

      <div id="input-row">
        <input type="file" id="file-upload" style="display: none;" accept="image/*,audio/*,video/*,.pdf,.doc,.docx" />
        <input type="file" id="photo-upload" style="display: none;" accept="image/*" />
        <input type="file" id="voice-upload" style="display: none;" accept="audio/*" capture="user" />
        
        <button id="upload-btn" aria-label="Upload file" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>
        <button id="photo-btn" aria-label="Upload photo" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </button>
        <button id="voice-btn" aria-label="Record voice" style="background: none; border: none; cursor: pointer; color: #9CA3AF; padding: 4px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>

        <input id="message-input" type="text" placeholder="Ask about an order, returns, or anything else" autocomplete="off">
        <button id="send-btn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="widget.js?v=6"></script>
</body>
</html>
