<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storefront — Wrennon Showcase</title>
<link rel="stylesheet" href="widget.css">
</head>
<body>

  <!-- Placeholder storefront background so the widget has real context to sit on -->
  <main class="storefront-mock">
    <header class="storefront-mock__nav">
      <span class="storefront-mock__logo">Northbound Goods</span>
    </header>
    <section class="storefront-mock__hero">
      <h1>Field jackets, built for weather that doesn't cooperate.</h1>
      <p>This page is a placeholder backdrop — the actual deliverable is the chat widget in the corner.</p>
    </section>
  </main>

  <!-- Chat widget -->
  <div id="wrennon-widget">
    <button id="launcher" aria-label="Open support chat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </button>

    <div id="panel" class="hidden">
      <header id="panel-header">
        <div class="panel-header__title">
          <span class="panel-header__brand">Northbound Goods support</span>
        </div>
        <button id="close-btn" aria-label="Close chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </header>

      <div id="messages" aria-live="polite"></div>

      <div id="input-row">
        <input id="message-input" type="text" placeholder="Ask about an order, returns, or anything else" autocomplete="off">
        <button id="send-btn" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="widget.js"></script>
</body>
</html>
